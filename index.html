<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Schedule Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th {
            background: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        
        table td {
            padding: 10px 12px;
            border-bottom: 1px solid #ddd;
        }
        
        table tr:hover {
            background: #f9f9f9;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge.completed {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .badge.scheduled {
            background: #bbdefb;
            color: #1565c0;
        }
        
        .badge.holiday {
            background: #ffccbc;
            color: #d84315;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Training Schedule Dashboard</h1>
        <p>Loading schedule from Training Schedule.csv...</p>
        <div id="content" class="loading">Loading data...</div>
    </div>

    <script>
        async function loadCSV() {
            try {
                // Fetch the CSV file from GitHub
                const response = await fetch('https://raw.githubusercontent.com/EmmaK-ID-5/Dashboard/main/Training%20Schedule.csv');
                
                if (!response.ok) {
                    throw new Error(`Failed to load CSV: ${response.status}`);
                }
                
                const csvText = await response.text();
                const rows = csvText.split('\n');
                
                // Parse CSV header
                const headers = rows[0].split(',').map(h => h.trim());
                
                // Parse CSV data
                const data = [];
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === '') continue;
                    
                    const cells = rows[i].split(',').map(c => c.trim());
                    const row = {};
                    
                    headers.forEach((header, index) => {
                        row[header] = cells[index] || '';
                    });
                    
                    data.push(row);
                }
                
                displaySchedule(data, headers);
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <strong>Error loading data:</strong> ${error.message}<br>
                        <small>Make sure the CSV file is uploaded to GitHub and GitHub Pages is enabled.</small>
                    </div>
                `;
                console.error('Error:', error);
            }
        }
        
        function displaySchedule(data, headers) {
            let html = '<table><thead><tr>';
            
            // Create table headers
            const displayHeaders = ['SessionDate', 'DayOfWeek', 'SessionTitle', 'SessionCategory', 'SessionType', 'TrainerName', 'TargetRegions', 'Language', 'Status'];
            
            displayHeaders.forEach(header => {
                html += `<th>${header.replace(/([A-Z])/g, ' $1').trim()}</th>`;
            });
            
            html += '</tr></thead><tbody>';
            
            // Create table rows
            data.forEach(row => {
                html += '<tr>';
                displayHeaders.forEach(header => {
                    let value = row[header] || '—';
                    
                    // Add badges for status
                    if (header === 'Status') {
                        if (value === 'Completed') {
                            value = `<span class="badge completed">${value}</span>`;
                        } else if (value === 'Scheduled') {
                            value = `<span class="badge scheduled">${value}</span>`;
                        }
                    }
                    
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            document.getElementById('content').innerHTML = html;
        }
        
        // Load CSV when page loads
        window.addEventListener('load', loadCSV);
    </script>
</body>
</html>
